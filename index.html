<style>
/* ===================================================
   🌷  THEME VARIABLES — easy customization
   =================================================== */
:root {
  --cream:        #f5ecd9;
  --cream-deep:   #ebe0c4;
  --paper:        #fdf9ef;
  --paper-shadow: rgba(120, 80, 50, 0.18);

  --rose:         #d97a87;
  --rose-deep:    #b85562;
  --rose-soft:    #f4cfd4;

  --sage:         #9caf88;
  --sage-deep:    #6f8662;

  --gold:         #c9a961;
  --burgundy:     #8b3a3a;
  --ink:          #4a3a30;

  --font-script:    'Parisienne', cursive;
  --font-signature: 'Allura', cursive;
  --font-serif:     'Cormorant Garamond', serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; }

body {
  font-family: var(--font-serif);
  color: var(--ink);
  background:
    radial-gradient(ellipse at 20% 0%, var(--rose-soft) 0%, transparent 45%),
    radial-gradient(ellipse at 90% 100%, rgba(156, 175, 136, 0.5) 0%, transparent 55%),
    linear-gradient(180deg, var(--cream) 0%, var(--cream-deep) 100%);
  background-attachment: fixed;
  overflow: hidden;
  perspective: 1500px;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none;
  background-image:
    radial-gradient(circle at 1px 1px, rgba(74, 58, 48, 0.04) 1px, transparent 0);
  background-size: 4px 4px;
  z-index: 1;
}

/* ===================================================
   FLOATING PETALS
   =================================================== */
.petals { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 2; }
.petal {
  position: absolute;
  width: 14px; height: 14px;
  background: var(--rose-soft);
  border-radius: 0 100% 0 100%;
  opacity: 0;
  animation: fall linear infinite;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.05));
}
.petal:nth-child(odd)  { background: var(--rose); }
.petal:nth-child(3n)   { background: var(--rose-deep); width: 10px; height: 10px; }
.petal:nth-child(5n)   { background: #f0a4ad; width: 16px; height: 16px; }

@keyframes fall {
  0%   { transform: translateY(-12vh) rotate(0deg);   opacity: 0; }
  10%  { opacity: 0.7; }
  90%  { opacity: 0.7; }
  100% { transform: translateY(112vh) rotate(720deg); opacity: 0; }
}

/* ===================================================
   STAGE
   =================================================== */
.scene {
  position: relative;
  width: 100%;
  height: 100vh;
  display: grid;
  place-items: center;
  z-index: 3;
}

/* ===================================================
   ENVELOPE
   =================================================== */
.envelope-stage {
  position: relative;
  cursor: pointer;
  transform-style: preserve-3d;
  transition: transform 1.4s cubic-bezier(0.6, 0, 0.2, 1),
              opacity   1.2s ease 0.6s;
}

.envelope {
  position: relative;
  width: 380px;
  height: 250px;
  transform-style: preserve-3d;
  filter: drop-shadow(0 25px 40px rgba(139, 58, 58, 0.25));
}

@media (max-width: 480px) {
  .envelope { width: 300px; height: 200px; }
}

.envelope-body {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--rose) 0%, var(--rose-deep) 100%);
  border-radius: 6px;
  box-shadow: inset 0 0 50px rgba(0,0,0,0.12);
}

.envelope-front-fold {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 60%;
  background: linear-gradient(135deg, var(--rose-deep) 0%, var(--burgundy) 100%);
  clip-path: polygon(0 100%, 100% 100%, 100% 0, 50% 65%, 0 0);
  z-index: 3;
  border-radius: 0 0 6px 6px;
}

.envelope-flap {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 60%;
  background: linear-gradient(135deg, var(--rose) 0%, var(--rose-deep) 100%);
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  transform-origin: top center;
  transition: transform 1s cubic-bezier(0.7, 0, 0.3, 1);
  z-index: 4;
  backface-visibility: hidden;
}
.envelope-flap::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0.18), transparent);
}

.letter-peek {
  position: absolute;
  top: 12%; left: 6%; right: 6%;
  height: 78%;
  background: var(--paper);
  border-radius: 4px;
  box-shadow: 0 6px 14px rgba(0,0,0,0.18);
  z-index: 2;
  transform: translateY(0);
  transition: transform 1.4s cubic-bezier(0.5, 0, 0.2, 1);
}

.seal {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 76px; height: 76px;
  background: radial-gradient(circle at 35% 30%, #d44a4a 0%, var(--burgundy) 70%, #5e2424 100%);
  border-radius: 50%;
  z-index: 6;
  display: grid; place-items: center;
  color: rgba(245, 236, 217, 0.85);
  font-family: var(--font-script);
  font-size: 38px;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
  box-shadow:
    0 6px 14px rgba(0,0,0,0.35),
    inset -4px -4px 10px rgba(0,0,0,0.3),
    inset 4px 4px 10px rgba(255,255,255,0.18);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.seal::before {
  content: '';
  position: absolute; inset: 4px;
  border-radius: 50%;
  border: 1.5px dashed rgba(245, 236, 217, 0.35);
}

.open-prompt {
  position: absolute;
  bottom: -70px; left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-script);
  font-size: 24px;
  color: var(--burgundy);
  white-space: nowrap;
  opacity: 0;
  animation: fadeInUp 1.2s ease 0.6s forwards, gentlePulse 2.4s ease-in-out 2s infinite;
}
.open-prompt::before, .open-prompt::after {
  content: '✿';
  margin: 0 12px;
  color: var(--rose-deep);
  font-size: 14px;
  vertical-align: middle;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translate(-50%, 10px); }
  to   { opacity: 1; transform: translate(-50%, 0); }
}
@keyframes gentlePulse {
  0%, 100% { opacity: 0.85; }
  50%      { opacity: 1; transform: translate(-50%, -3px); }
}

.envelope-stage:hover { transform: translateY(-4px) rotate(-1deg); }

/* ============= OPENING SEQUENCE STATES ============= */
body.flap-open .seal { opacity: 0; transform: translate(-50%, -50%) scale(0.6) rotate(20deg); }
body.flap-open .envelope-flap { transform: rotateX(-180deg); z-index: 1; }
body.flap-open .open-prompt   { opacity: 0; animation: none; }

body.letter-out .letter-peek    { transform: translateY(-180%); }
body.letter-out .envelope-stage { transform: translateY(80vh) scale(0.6); opacity: 0; }

/* ===================================================
   THE LETTER
   =================================================== */
.letter-stage {
  position: fixed; inset: 0;
  display: grid;
  place-items: center;
  padding: 40px 20px;
  pointer-events: none;
  opacity: 0;
  transform: scale(0.92);
  transition: opacity 0.9s ease, transform 1s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 5;
  overflow-y: auto;
}
body.letter-revealed .letter-stage {
  opacity: 1;
  transform: scale(1);
  pointer-events: auto;
}

.letter-paper {
  position: relative;
  width: min(620px, 100%);
  background: var(--paper);
  background-image:
    repeating-linear-gradient(180deg, transparent 0 38px, rgba(74, 58, 48, 0.06) 38px 39px),
    radial-gradient(circle at 15% 5%, rgba(217, 122, 135, 0.08) 0 25%, transparent 60%),
    radial-gradient(circle at 85% 95%, rgba(156, 175, 136, 0.10) 0 20%, transparent 60%);
  padding: 70px 60px 80px;
  border-radius: 4px;
  box-shadow:
    0 30px 60px var(--paper-shadow),
    0 10px 25px rgba(0,0,0,0.08),
    inset 0 0 0 1px rgba(120, 80, 50, 0.05);
  font-size: 18px;
  line-height: 1.85;
  color: var(--ink);
}

@media (max-width: 480px) {
  .letter-paper { padding: 50px 30px 60px; font-size: 16px; }
}

.letter-paper::before {
  content: '';
  position: absolute;
  top: -8px; left: 0; right: 0; height: 12px;
  background: var(--paper);
  clip-path: polygon(
    0 100%, 3% 40%, 7% 90%, 12% 30%, 17% 80%, 22% 35%, 28% 90%,
    34% 25%, 40% 85%, 46% 35%, 52% 80%, 58% 30%, 64% 85%, 70% 30%,
    76% 80%, 82% 35%, 88% 90%, 94% 30%, 100% 80%, 100% 100%
  );
}

.letter-greeting {
  font-family: var(--font-script);
  font-size: 52px;
  color: var(--burgundy);
  margin-bottom: 24px;
  line-height: 1;
}
@media (max-width: 480px) { .letter-greeting { font-size: 40px; } }

.letter-message {
  font-style: italic;
  font-weight: 400;
}
.letter-message p { margin-bottom: 1.1em; }

/* poem stanza style — centered, tighter */
.letter-message p.stanza {
  text-align: center;
  line-height: 1.7;
  margin: 1.4em auto;
  max-width: 90%;
}

.letter-sign-off {
  margin-top: 36px;
  font-style: italic;
  color: var(--ink);
}

.letter-signature {
  margin-top: 8px;
  font-family: var(--font-signature);
  font-size: 44px;
  color: var(--rose-deep);
  line-height: 1;
}

.letter-paper .accent {
  position: absolute;
  bottom: 22px; right: 28px;
  width: 32px; height: 32px;
  opacity: 0.7;
}

/* fade-in: animation runs, JS sets each delay */
body.letter-revealed .letter-greeting,
body.letter-revealed .letter-message p,
body.letter-revealed .letter-sign-off,
body.letter-revealed .letter-signature {
  animation: lineFade 0.9s ease both;
}

.letter-greeting,
.letter-message p,
.letter-sign-off,
.letter-signature { opacity: 0; }

body.letter-revealed .letter-greeting { animation-delay: 0.2s; }

@keyframes lineFade {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ===================================================
   FLORAL GARLAND
   =================================================== */
.garland {
  position: absolute;
  top: -40px; left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: flex-end;
  gap: 4px;
  pointer-events: none;
  z-index: 2;
}
.garland .bloom {
  width: 70px; height: 90px;
  transform: scale(0) rotate(-10deg);
  transform-origin: bottom center;
  transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.garland .bloom:nth-child(even) { width: 56px; height: 78px; }
.garland .bloom:nth-child(1) { transform-origin: bottom right; }
.garland .bloom:nth-child(7) { transform-origin: bottom left; }

body.letter-revealed .garland .bloom { transform: scale(1) rotate(0); }
body.letter-revealed .garland .bloom:nth-child(1) { transition-delay: 0.30s; }
body.letter-revealed .garland .bloom:nth-child(2) { transition-delay: 0.45s; }
body.letter-revealed .garland .bloom:nth-child(3) { transition-delay: 0.60s; }
body.letter-revealed .garland .bloom:nth-child(4) { transition-delay: 0.20s; }
body.letter-revealed .garland .bloom:nth-child(5) { transition-delay: 0.75s; }
body.letter-revealed .garland .bloom:nth-child(6) { transition-delay: 0.90s; }
body.letter-revealed .garland .bloom:nth-child(7) { transition-delay: 1.05s; }

.corner-flower {
  position: absolute;
  bottom: -18px; left: -18px;
  width: 90px; height: 90px;
  opacity: 0;
  transform: rotate(-30deg) scale(0.8);
  transition: opacity 1s ease 1.4s, transform 1s cubic-bezier(0.34, 1.56, 0.64, 1) 1.4s;
}
body.letter-revealed .corner-flower {
  opacity: 0.9;
  transform: rotate(-15deg) scale(1);
}

/* ===================================================
   MUSIC + REPLAY BUTTONS
   =================================================== */
.music-btn {
  position: fixed;
  bottom: 24px; right: 24px;
  width: 52px; height: 52px;
  border-radius: 50%;
  border: none;
  background: var(--rose-deep);
  color: var(--cream);
  cursor: pointer;
  display: grid; place-items: center;
  box-shadow: 0 8px 20px rgba(139, 58, 58, 0.35);
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s ease 1.6s, transform 0.6s ease 1.6s, background 0.3s;
  z-index: 10;
}
body.letter-revealed .music-btn { opacity: 1; transform: translateY(0); }
.music-btn:hover { background: var(--burgundy); }
.music-btn svg   { width: 22px; height: 22px; }
.music-btn .icon-pause { display: none; }
.music-btn.playing .icon-play  { display: none; }
.music-btn.playing .icon-pause { display: block; }

.replay-btn {
  position: fixed;
  bottom: 24px; left: 24px;
  background: transparent;
  border: 1px solid var(--rose-deep);
  color: var(--rose-deep);
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 14px;
  padding: 8px 18px;
  border-radius: 999px;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.6s ease 1.8s, background 0.3s, color 0.3s;
  z-index: 10;
}
body.letter-revealed .replay-btn { opacity: 1; }
.replay-btn:hover { background: var(--rose-deep); color: var(--cream); }

</style>
</head>

    <div class="letter-message" id="messageBody"></div>
    <p class="letter-sign-off" id="signOff"></p>
    <p class="letter-signature" id="signature"></p>

    <svg class="corner-flower" viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 85 Q35 55 55 35" stroke="#6f8662" stroke-width="2" fill="none" stroke-linecap="round"/>
      <ellipse cx="35" cy="60" rx="10" ry="4" fill="#9caf88" transform="rotate(-30 35 60)"/>
      <ellipse cx="50" cy="50" rx="8" ry="3.5" fill="#9caf88" transform="rotate(40 50 50)"/>
      <g transform="translate(60 30)">
        <ellipse cx="0" cy="-10" rx="6" ry="10" fill="#d97a87"/>
        <ellipse cx="0" cy="-10" rx="6" ry="10" fill="#d97a87" transform="rotate(72)"/>
        <ellipse cx="0" cy="-10" rx="6" ry="10" fill="#d97a87" transform="rotate(144)"/>
        <ellipse cx="0" cy="-10" rx="6" ry="10" fill="#d97a87" transform="rotate(216)"/>
        <ellipse cx="0" cy="-10" rx="6" ry="10" fill="#d97a87" transform="rotate(288)"/>
        <circle r="4" fill="#c9a961"/>
      </g>
    </svg>

    <svg class="accent" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <path d="M16 28 C 6 20, 2 12, 8 7 C 12 4, 15 7, 16 9 C 17 7, 20 4, 24 7 C 30 12, 26 20, 16 28 Z"
            fill="#d97a87" opacity="0.6"/>
    </svg>
  </div>
</div>

<button class="music-btn" id="musicBtn" title="Play / pause music" aria-label="Play music">
  <svg class="icon-play"  viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
  <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
</button>

<button class="replay-btn" id="replayBtn">↺ seal it back up</button>

<audio id="bgMusic" loop preload="auto"></audio>


<script>
/* ════════════════════════════════════════════════════════════════
   ╔═══════════════════════════════════════════════════════════╗
   ║                    🌸  CONFIG  🌸                          ║
   ║   Edit this object to personalize the whole letter.       ║
   ╚═══════════════════════════════════════════════════════════╝

   PARAGRAPH RULES:
   • Each "..." is one paragraph.
   • EVERY paragraph MUST end with a comma (this is what caused
     the "Unexpected string" error before).
   • Use \n inside a string for a line break (great for poetry).
   • Use { stanza: true, text: "..." } to style a paragraph as
     a centered poem stanza with tighter line spacing.
   ════════════════════════════════════════════════════════════════ */
const CONFIG = {

  sealLetter: "M",

  greeting: "Dear Mom,",

  message: [
    "Happy Mother's Day, Mom. Through my darkest nights and brightest days, I have never forgotten you. You are my mother, and the shining light of my soul.",

    "Today is not just an ordinary day — but your day. The day we celebrate your journey as a mother, and the day you first began carrying me into this world.",

    "I don't say these things out loud. I tend to forget them. But let me remind you: you're the BEST mother anyone could ever have.",

    "My friends always tell me that. And to know that any other kid could have ended up with my mother — but I became the statistical impossibility and got you — that makes me unbelievably happy.",

    "In 20 years, I'm sure I'll still be thanking you for everything: for keeping me alive, and for keeping my burning heart still burning.",

    "Because to be honest, Mom — without you, I wouldn't be who I am now. Still trying to spread smiles and kindness, even when the world tells me to stop.",

    "I never do this for Mother's Day. But if it's for the best mother any kid could have, I'd do it a thousand times — in every universe I'm alive in.",

    "I'll never forget what you've done as a mother, and the sacrifices you endured when you had me. For that — thank you for everything, Mom.",

    // ── poem stanzas (centered, line-broken) ──
    { stanza: true, text:
      "I could have never thought of a day,\n" +
      "Without my mother leading my way.\n" +
      "Countless stars and nights of my cry —\n" +
      "But my mother put my pain to rest nearby."
    },

    { stanza: true, text:
      "Today is a special day,\n" +
      "A day where we celebrate her way.\n" +
      "I can't find all the words to say,\n" +
      "How much she means to me every day."
    },

    { stanza: true, text:
      "Mom, your son kept your flame,\n" +
      "And that flame gave your son the blaze.\n" +
      "A blaze in a heart now warm and true,\n" +
      "Filled with kindness because of you."
    }
  ],

  signOff: "Yours always,",

  signature: "Your Loving Son, Jared",

  pageTitle: "A Letter For You, Mom",

  // ─── MUSIC ──────────────────────────────────────────────────
  // Paste a direct .mp3 / .ogg / .wav URL. For GitHub, use the
  // RAW link: https://raw.githubusercontent.com/USER/REPO/main/song.mp3
  musicUrl: "https://raw.githubusercontent.com/SoulIsRed/Mothers-Day/main/song.mp3",
  autoplayMusic: true,
  musicVolume: 0.5
};

/* ════════════════════════════════════════════════════════════════
   You generally don't need to edit anything below this line.
   ════════════════════════════════════════════════════════════════ */

document.title = CONFIG.pageTitle;
document.getElementById('seal').textContent = CONFIG.sealLetter;
document.getElementById('greeting').textContent  = CONFIG.greeting;
document.getElementById('signOff').textContent   = CONFIG.signOff;
document.getElementById('signature').textContent = CONFIG.signature;

// ── Render message paragraphs ──────────────────────────────────
const messageBody = document.getElementById('messageBody');

// Animation timing scales to however many paragraphs you have —
// no need to update CSS when you add or remove paragraphs.
const FADE_BASE = 0.6;     // when first paragraph appears (sec)
const FADE_STEP = 0.28;    // delay between paragraphs (sec)

CONFIG.message.forEach((item, idx) => {
  const p = document.createElement('p');

  // Accept either plain string OR { stanza: true, text: "..." }
  const isStanza = typeof item === 'object' && item.stanza;
  const text     = isStanza ? item.text : item;

  if (isStanza) p.classList.add('stanza');

  // Convert \n into real <br> line breaks (for poetry)
  text.split('\n').forEach((line, i, arr) => {
    p.appendChild(document.createTextNode(line));
    if (i < arr.length - 1) p.appendChild(document.createElement('br'));
  });

  p.style.animationDelay = (FADE_BASE + idx * FADE_STEP) + 's';
  messageBody.appendChild(p);
});

// Sign-off + signature appear AFTER the last paragraph,
// no matter how many paragraphs there are.
const lastDelay = FADE_BASE + CONFIG.message.length * FADE_STEP;
document.getElementById('signOff').style.animationDelay   = (lastDelay + 0.2) + 's';
document.getElementById('signature').style.animationDelay = (lastDelay + 0.5) + 's';

// ── Audio ──────────────────────────────────────────────────────
const audio = document.getElementById('bgMusic');
if (CONFIG.musicUrl) {
  audio.src    = CONFIG.musicUrl;
  audio.volume = CONFIG.musicVolume;
}

// ── Floating petals ────────────────────────────────────────────
const petalContainer = document.getElementById('petals');
const PETAL_COUNT = 18;
for (let i = 0; i < PETAL_COUNT; i++) {
  const petal = document.createElement('div');
  petal.className = 'petal';
  petal.style.left              = Math.random() * 100 + 'vw';
  petal.style.animationDuration = (8 + Math.random() * 10) + 's';
  petal.style.animationDelay    = (Math.random() * 12) + 's';
  petal.style.transform         = `scale(${0.6 + Math.random() * 0.8})`;
  petalContainer.appendChild(petal);
}

// ── Opening sequence ───────────────────────────────────────────
const envelopeStage = document.getElementById('envelopeStage');
const musicBtn      = document.getElementById('musicBtn');
let isOpen = false;

envelopeStage.addEventListener('click', openLetter);

function openLetter() {
  if (isOpen) return;
  isOpen = true;

  // ── Start music IMMEDIATELY on click (this is a real user
  //    gesture, so browsers will allow it). Don't wait for the
  //    letter to open — start the song the moment Mom taps. ──
  if (CONFIG.musicUrl && CONFIG.autoplayMusic) {
    audio.play().then(() => {
      musicBtn.classList.add('playing');
    }).catch(() => { /* autoplay blocked anyway — button is fallback */ });
  }

  // Visual sequence — letter opening animation
  document.body.classList.add('flap-open');
  setTimeout(() => document.body.classList.add('letter-out'), 900);
  setTimeout(() => document.body.classList.add('letter-revealed'), 1700);
}

// ── Music toggle ───────────────────────────────────────────────
musicBtn.addEventListener('click', () => {
  if (!CONFIG.musicUrl) {
    alert('No music URL is set. Add one to CONFIG.musicUrl in the code.');
    return;
  }
  if (audio.paused) {
    audio.play();
    musicBtn.classList.add('playing');
  } else {
    audio.pause();
    musicBtn.classList.remove('playing');
  }
});

// ── Replay button ──────────────────────────────────────────────
document.getElementById('replayBtn').addEventListener('click', () => {
  document.body.classList.remove('flap-open', 'letter-out', 'letter-revealed');
  audio.pause();
  audio.currentTime = 0;
  musicBtn.classList.remove('playing');
  isOpen = false;
});

// Keyboard support for the envelope
envelopeStage.setAttribute('tabindex', '0');
envelopeStage.setAttribute('role', 'button');
envelopeStage.setAttribute('aria-label', 'Open the letter');
envelopeStage.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openLetter(); }
});
</script>
</body>
</html>
